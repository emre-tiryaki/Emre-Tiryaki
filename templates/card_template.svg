<svg xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace" width="985px" height="540px" font-size="14px">
<style>
  .key { fill: #ffa657; }
  .value { fill: #a5d6ff; }
  .addColor { fill: #3fb950; }
  .delColor { fill: #f85149; }
  .cc { fill: #616e7f; }
  text, tspan { white-space: pre; }
</style>
<rect width="985px" height="540px" fill="#161b22" rx="15"/>

