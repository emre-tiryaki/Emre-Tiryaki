<!-- Sağ Tarafta Sistem ve GitHub Bilgileri (Resme yakınlaştırıldı) -->
<text x="480" y="45" fill="#c9d1d9">
  <tspan x="480" y="45">{username}@github</tspan> ----------------------------------
  <tspan x="480" y="75" class="cc">. </tspan><tspan class="key">OS</tspan>:<tspan class="cc"> ........................ </tspan><tspan class="value">{os_info}</tspan>
  <tspan x="480" y="100" class="cc">. </tspan><tspan class="key">Host</tspan>:<tspan class="cc"> ...................... </tspan><tspan class="value">{host_info}</tspan>
  <tspan x="480" y="125" class="cc">. </tspan><tspan class="key">Kernel</tspan>:<tspan class="cc"> .................... </tspan><tspan class="value">{kernel_info}</tspan>
  <tspan x="480" y="150" class="cc">. </tspan><tspan class="key">IDE</tspan>:<tspan class="cc"> ....................... </tspan><tspan class="value">{ide_info}</tspan>
  
  <tspan x="480" y="190" class="cc">. </tspan><tspan class="key">Languages</tspan>.<tspan class="key">Programming</tspan>:<tspan class="cc"> ..... </tspan><tspan class="value">{languages_prog}</tspan>
  <tspan x="480" y="215" class="cc">. </tspan><tspan class="key">Languages</tspan>.<tspan class="key">Real</tspan>:<tspan class="cc"> ................ </tspan><tspan class="value">{languages_real}</tspan>

  <tspan x="480" y="255" class="cc">. </tspan><tspan class="key">Hobbies</tspan>:<tspan class="cc"> ................... </tspan><tspan class="value">{hobbies}</tspan>

  <tspan x="480" y="295">- Contact ------------------------------------------------</tspan>
  <tspan x="480" y="325" class="cc">. </tspan><tspan class="key">Email</tspan>:<tspan class="cc"> ..................... </tspan><tspan class="value">{email}</tspan>
  <tspan x="480" y="350" class="cc">. </tspan><tspan class="key">LinkedIn</tspan>:<tspan class="cc"> .................- </tspan><tspan class="value">{linkedin}</tspan>

  <tspan x="480" y="390">- GitHub Stats -------------------------------------------</tspan>
  <tspan x="480" y="420" class="cc">. </tspan><tspan class="key">Repos</tspan>:<tspan class="cc"> </tspan><tspan class="value">{repos}</tspan> {<tspan class="key">Contributed</tspan>: <tspan class="value">{contributed}</tspan>} | <tspan class="key">Stars</tspan>:<tspan class="cc"> </tspan><tspan class="value">{stars}</tspan>
  <tspan x="480" y="445" class="cc">. </tspan><tspan class="key">Commits</tspan>:<tspan class="cc"> </tspan><tspan class="value">{commits}</tspan> | <tspan class="key">Followers</tspan>:<tspan class="cc"> </tspan><tspan class="value">{followers}</tspan>
  <tspan x="480" y="470" class="cc">. </tspan><tspan class="key">Lines of Code</tspan>:<tspan class="cc"> </tspan><tspan class="value">{loc_total}</tspan> ( <tspan class="addColor">{loc_add}++</tspan>, <tspan class="delColor">{loc_del}--</tspan> )
</text>
</svg>
